<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Fluid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
video{display:none}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;font-family:sans-serif;opacity:0.4;pointer-events:none;transition:opacity 2s ease}
#hint.hidden{opacity:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<video id="v" playsinline></video>
<div id="hint">move your hands</div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
'use strict';

// ── CONFIG ──────────────────────────────────────────────────────────────────
const CFG = {
  SIM_RESOLUTION: 256,
  DYE_RESOLUTION: 1024,
  DENSITY_DISSIPATION: 0.97,
  VELOCITY_DISSIPATION: 0.98,
  PRESSURE: 0.8,
  PRESSURE_ITERATIONS: 20,
  CURL: 30,
  SPLAT_RADIUS: 0.004,
  BLOOM: true,
  BLOOM_ITERATIONS: 8,
  BLOOM_RESOLUTION: 256,
  BLOOM_INTENSITY: 0.8,
  SUNRAYS: true,
  SUNRAYS_RESOLUTION: 196,
  SUNRAYS_WEIGHT: 1.0,
  TRANSPARENT: false,
  BACK_COLOR: {r:0,g:0,b:0}
};

// ── WEBGL SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {alpha:true,depth:false,stencil:false,antialias:false,preserveDrawingBuffer:false});
if(!gl) alert('WebGL2 not supported');

let ext = {};
function getExts(){
  ext.formatRGBA = getSupportedFormat(gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT);
  ext.formatRG   = getSupportedFormat(gl.RG16F,   gl.RG,   gl.HALF_FLOAT);
  ext.formatR    = getSupportedFormat(gl.R16F,     gl.RED,  gl.HALF_FLOAT);
  ext.halfFloatTexType = gl.HALF_FLOAT;
  ext.supportLinearFiltering = !!gl.getExtension('OES_texture_float_linear');
}
function getSupportedFormat(internalFormat, format, type){
  if(!supportRenderTextureFormat(gl,internalFormat,format,type)){
    switch(internalFormat){
      case gl.R16F:  return getSupportedFormat(gl.RG16F,gl.RG,type);
      case gl.RG16F: return getSupportedFormat(gl.RGBA16F,gl.RGBA,type);
      default: return null;
    }
  }
  return {internalFormat,format};
}
function supportRenderTextureFormat(gl,internalFormat,format,type){
  let tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,internalFormat,4,4,0,format,type,null);
  let fbo=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  let status=gl.checkFramebufferStatus(gl.FRAMEBUFFER);
  return status===gl.FRAMEBUFFER_COMPLETE;
}
getExts();

// ── SHADERS ──────────────────────────────────────────────────────────────────
function compileShader(type,src,keywords){
  src=addKeywords(src,keywords);
  const shader=gl.createShader(type);
  gl.shaderSource(shader,src);
  gl.compileShader(shader);
  if(!gl.getShaderParameter(shader,gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(shader),src);
  return shader;
}
function addKeywords(src,keywords){
  if(!keywords) return src;
  let kStr=keywords.map(k=>`#define ${k}`).join('\n');
  return kStr+'\n'+src;
}
function createProgram(vSrc,fSrc,keywords){
  const prog=gl.createProgram();
  gl.attachShader(prog,compileShader(gl.VERTEX_SHADER,vSrc));
  gl.attachShader(prog,compileShader(gl.FRAGMENT_SHADER,fSrc,keywords));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS))
    console.error(gl.getProgramInfoLog(prog));
  return prog;
}
function getUniforms(prog){
  const uniforms={};
  const n=gl.getProgramParameter(prog,gl.ACTIVE_UNIFORMS);
  for(let i=0;i<n;i++){
    const info=gl.getActiveUniform(prog,i);
    uniforms[info.name]=gl.getUniformLocation(prog,info.name);
  }
  return uniforms;
}

class GLProgram{
  constructor(vSrc,fSrc,keywords){
    this.prog=createProgram(vSrc,fSrc,keywords);
    this.uniforms=getUniforms(this.prog);
  }
  bind(){gl.useProgram(this.prog);}
}

// ── VERTEX SHADER ────────────────────────────────────────────────────────────
const baseVertSrc=`#version 300 es
precision highp float;
layout(location=0) in vec2 aPos;
out vec2 vUv;
out vec2 vL;
out vec2 vR;
out vec2 vT;
out vec2 vB;
uniform vec2 texelSize;
void main(){
  vUv=(aPos+1.0)*0.5;
  vL=vUv-vec2(texelSize.x,0.0);
  vR=vUv+vec2(texelSize.x,0.0);
  vT=vUv+vec2(0.0,texelSize.y);
  vB=vUv-vec2(0.0,texelSize.y);
  gl_Position=vec4(aPos,0.0,1.0);
}`;

const blurVertSrc=`#version 300 es
precision highp float;
layout(location=0) in vec2 aPos;
out vec2 vUv;
out vec2 vL;
out vec2 vR;
uniform vec2 texelSize;
void main(){
  vUv=(aPos+1.0)*0.5;
  float off=1.33333333;
  vL=vUv-texelSize*off;
  vR=vUv+texelSize*off;
  gl_Position=vec4(aPos,0.0,1.0);
}`;

// ── FRAGMENT SHADERS ─────────────────────────────────────────────────────────
const blurFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;in vec2 vL;in vec2 vR;
uniform sampler2D uTexture;
out vec4 oColor;
void main(){
  oColor=0.29411764*texture(uTexture,vUv)+0.35294117*(texture(uTexture,vL)+texture(uTexture,vR));
}`;

const copyFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;uniform sampler2D uTexture;out vec4 oColor;
void main(){oColor=texture(uTexture,vUv);}`;

const clearFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;uniform sampler2D uTexture;uniform float value;out vec4 oColor;
void main(){oColor=value*texture(uTexture,vUv);}`;

const colorFragSrc=`#version 300 es
precision mediump float;
uniform vec4 color;out vec4 oColor;
void main(){oColor=color;}`;

const checkerFragSrc=`#version 300 es
precision highp float;
in vec2 vUv;
uniform float aspectRatio;
out vec4 oColor;
#define SCALE 25.0
void main(){
  vec2 uv=floor(vUv*SCALE*vec2(aspectRatio,1.0));
  float v=mod(uv.x+uv.y,2.0);
  v=v*0.1+0.8;
  oColor=vec4(vec3(v),1.0);
}`;

const displayFragSrc=`#version 300 es
precision highp float;
in vec2 vUv;
uniform sampler2D uTexture;
uniform sampler2D uBloom;
uniform sampler2D uSunrays;
uniform sampler2D uDithering;
uniform vec2 ditherScale;
uniform vec2 texelSize;
out vec4 oColor;
vec3 linearToGamma(vec3 color){color=max(color,vec3(0));return max(1.055*pow(color,vec3(0.4166666667))-0.055,vec3(0));}
void main(){
  vec3 c=texture(uTexture,vUv).rgb;
  #ifdef SHADING
    vec3 lc=texture(uTexture,vUv-vec2(texelSize.x,0)).rgb;
    vec3 rc=texture(uTexture,vUv+vec2(texelSize.x,0)).rgb;
    vec3 tc=texture(uTexture,vUv+vec2(0,texelSize.y)).rgb;
    vec3 bc=texture(uTexture,vUv-vec2(0,texelSize.y)).rgb;
    float dx=length(rc)-length(lc);
    float dy=length(tc)-length(bc);
    vec3 n=normalize(vec3(dx,dy,length(texelSize)));
    vec3 l=vec3(0.0,0.0,1.0);
    float diffuse=clamp(dot(n,l)+0.7,0.7,1.0);
    c*=diffuse;
  #endif
  #ifdef BLOOM
    vec3 bloom=texture(uBloom,vUv).rgb;
  #endif
  #ifdef SUNRAYS
    float sunrays=texture(uSunrays,vUv).r;
    c*=sunrays;
    #ifdef BLOOM
      bloom*=sunrays;
    #endif
  #endif
  #ifdef BLOOM
    float noise=texture(uDithering,vUv*ditherScale).r;
    noise=noise*2.0-1.0;
    bloom+=noise/255.0;
    bloom=linearToGamma(bloom);
    c+=bloom;
  #endif
  float a=max(c.r,max(c.g,c.b));
  oColor=vec4(linearToGamma(c),a);
}`;

const bloomPreFilterFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;uniform sampler2D uTexture;uniform vec3 curve;uniform float threshold;out vec4 oColor;
void main(){
  vec3 c=texture(uTexture,vUv).rgb;
  float br=max(c.r,max(c.g,c.b));
  float rq=clamp(br-curve.x,0.0,curve.y);
  rq=(curve.z*rq*rq)/(br+0.00001);
  c*=max(rq,br-threshold)/(br+0.00001);
  oColor=vec4(c,0.0);
}`;

const bloomBlurFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;in vec2 vL;in vec2 vR;in vec2 vT;in vec2 vB;
uniform sampler2D uTexture;out vec4 oColor;
void main(){
  vec4 sum=vec4(0.0);
  sum+=texture(uTexture,vL);
  sum+=texture(uTexture,vR);
  sum+=texture(uTexture,vT);
  sum+=texture(uTexture,vB);
  sum*=0.25;
  oColor=sum;
}`;

const bloomFinalFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;in vec2 vL;in vec2 vR;in vec2 vT;in vec2 vB;
uniform sampler2D uTexture;uniform float intensity;out vec4 oColor;
void main(){
  vec4 sum=vec4(0.0);
  sum+=texture(uTexture,vL);
  sum+=texture(uTexture,vR);
  sum+=texture(uTexture,vT);
  sum+=texture(uTexture,vB);
  sum*=0.25;
  oColor=sum*intensity;
}`;

const sunraysMaskFragSrc=`#version 300 es
precision highp float;
in vec2 vUv;uniform sampler2D uTexture;out vec4 oColor;
void main(){
  vec4 c=texture(uTexture,vUv);
  float br=max(c.r,max(c.g,c.b));
  c.a=1.0-min(br*20.0,0.8);
  oColor=c;
}`;

const sunraysFragSrc=`#version 300 es
precision highp float;
in vec2 vUv;uniform sampler2D uTexture;uniform float weight;out vec4 oColor;
#define ITERATIONS 16
void main(){
  float Decay=0.98;
  float Exposure=0.0;
  float Density=0.3;
  vec2 coord=vUv;
  vec2 delta=coord-0.5;
  delta*=-1.0/(float(ITERATIONS)*Density);
  float illumDecay=1.0;
  float color=0.0;
  for(int i=0;i<ITERATIONS;i++){
    coord+=delta;
    float col=texture(uTexture,coord).a;
    color+=col*illumDecay*weight;
    illumDecay*=Decay;
  }
  oColor=vec4(color,0.0,0.0,1.0);
}`;

const splatFragSrc=`#version 300 es
precision highp float;
in vec2 vUv;
uniform sampler2D uTarget;
uniform float aspectRatio;
uniform vec3 color;
uniform vec2 point;
uniform float radius;
out vec4 oColor;
void main(){
  vec2 p=vUv-point.xy;
  p.x*=aspectRatio;
  vec3 splat=exp(-dot(p,p)/(radius))*color;
  vec3 base=texture(uTarget,vUv).xyz;
  oColor=vec4(base+splat,1.0);
}`;

const advectionFragSrc=`#version 300 es
precision highp float;
in vec2 vUv;
uniform sampler2D uVelocity;
uniform sampler2D uSource;
uniform vec2 texelSize;
uniform vec2 dyeTexelSize;
uniform float dt;
uniform float dissipation;
out vec4 oColor;
vec4 bilerp(sampler2D sam,vec2 uv,vec2 tSize){
  vec2 st=uv/tSize-0.5;
  vec2 iuv=floor(st);
  vec2 fuv=fract(st);
  vec4 a=texture(sam,(iuv+vec2(0.5,0.5))*tSize);
  vec4 b=texture(sam,(iuv+vec2(1.5,0.5))*tSize);
  vec4 c=texture(sam,(iuv+vec2(0.5,1.5))*tSize);
  vec4 d=texture(sam,(iuv+vec2(1.5,1.5))*tSize);
  return mix(mix(a,b,fuv.x),mix(c,d,fuv.x),fuv.y);
}
void main(){
  #ifdef MANUAL_FILTERING
    vec2 coord=vUv-dt*bilerp(uVelocity,vUv,texelSize).xy*texelSize;
    vec4 result=bilerp(uSource,coord,dyeTexelSize);
  #else
    vec2 coord=vUv-dt*texture(uVelocity,vUv).xy*texelSize;
    vec4 result=texture(uSource,coord);
  #endif
  oColor=dissipation*result;
}`;

const divergenceFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;in vec2 vL;in vec2 vR;in vec2 vT;in vec2 vB;
uniform sampler2D uVelocity;out vec4 oColor;
void main(){
  float L=texture(uVelocity,vL).x;
  float R=texture(uVelocity,vR).x;
  float T=texture(uVelocity,vT).y;
  float B=texture(uVelocity,vB).y;
  vec2 C=texture(uVelocity,vUv).xy;
  if(vL.x<0.0){L=-C.x;}
  if(vR.x>1.0){R=-C.x;}
  if(vT.y>1.0){T=-C.y;}
  if(vB.y<0.0){B=-C.y;}
  float div=0.5*(R-L+T-B);
  oColor=vec4(div,0.0,0.0,1.0);
}`;

const curlFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;in vec2 vL;in vec2 vR;in vec2 vT;in vec2 vB;
uniform sampler2D uVelocity;out vec4 oColor;
void main(){
  float L=texture(uVelocity,vL).y;
  float R=texture(uVelocity,vR).y;
  float T=texture(uVelocity,vT).x;
  float B=texture(uVelocity,vB).x;
  float curl=R-L-T+B;
  oColor=vec4(0.5*curl,0.0,0.0,1.0);
}`;

const vorticityFragSrc=`#version 300 es
precision highp float;
in vec2 vUv;in vec2 vL;in vec2 vR;in vec2 vT;in vec2 vB;
uniform sampler2D uVelocity;uniform sampler2D uCurl;uniform float curl;uniform float dt;out vec4 oColor;
void main(){
  float L=texture(uCurl,vL).x;
  float R=texture(uCurl,vR).x;
  float T=texture(uCurl,vT).x;
  float B=texture(uCurl,vB).x;
  float C=texture(uCurl,vUv).x;
  vec2 force=0.5*vec2(abs(T)-abs(B),abs(R)-abs(L));
  force/=length(force)+0.0001;
  force*=curl*C;
  force.y*=-1.0;
  vec2 v=texture(uVelocity,vUv).xy;
  oColor=vec4(v+force*dt,0.0,1.0);
}`;

const pressureFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;in vec2 vL;in vec2 vR;in vec2 vT;in vec2 vB;
uniform sampler2D uPressure;uniform sampler2D uDivergence;out vec4 oColor;
void main(){
  float L=texture(uPressure,vL).x;
  float R=texture(uPressure,vR).x;
  float T=texture(uPressure,vT).x;
  float B=texture(uPressure,vB).x;
  float C=texture(uPressure,vUv).x;
  float divergence=texture(uDivergence,vUv).x;
  float pressure=(L+R+B+T-divergence)*0.25;
  oColor=vec4(pressure,0.0,0.0,1.0);
}`;

const gradientSubtractFragSrc=`#version 300 es
precision mediump float;
in vec2 vUv;in vec2 vL;in vec2 vR;in vec2 vT;in vec2 vB;
uniform sampler2D uPressure;uniform sampler2D uVelocity;out vec4 oColor;
void main(){
  float L=texture(uPressure,vL).x;
  float R=texture(uPressure,vR).x;
  float T=texture(uPressure,vT).x;
  float B=texture(uPressure,vB).x;
  vec2 velocity=texture(uVelocity,vUv).xy;
  velocity.xy-=vec2(R-L,T-B);
  oColor=vec4(velocity,0.0,1.0);
}`;

// ── FRAMEBUFFER UTILS ────────────────────────────────────────────────────────
function createFBO(w,h,internalFormat,format,type,param){
  gl.activeTexture(gl.TEXTURE0);
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,param);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,param);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,internalFormat,w,h,0,format,type,null);
  const fbo=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.viewport(0,0,w,h);
  gl.clear(gl.COLOR_BUFFER_BIT);
  const texelSizeX=1/w,texelSizeY=1/h;
  return{texture:tex,fbo,width:w,height:h,texelSizeX,texelSizeY,
    attach(id){gl.activeTexture(gl.TEXTURE0+id);gl.bindTexture(gl.TEXTURE_2D,tex);return id;}
  };
}
function createDoubleFBO(w,h,internalFormat,format,type,param){
  let fbo1=createFBO(w,h,internalFormat,format,type,param);
  let fbo2=createFBO(w,h,internalFormat,format,type,param);
  return{
    width:w,height:h,texelSizeX:fbo1.texelSizeX,texelSizeY:fbo1.texelSizeY,
    get read(){return fbo1;},
    get write(){return fbo2;},
    swap(){let tmp=fbo1;fbo1=fbo2;fbo2=tmp;}
  };
}
function resizeFBO(target,w,h,internalFormat,format,type,param){
  const newFBO=createFBO(w,h,internalFormat,format,type,param);
  copyProg.bind();
  gl.uniform1i(copyProg.uniforms.uTexture,target.attach(0));
  blit(newFBO);
  return newFBO;
}
function resizeDoubleFBO(target,w,h,internalFormat,format,type,param){
  if(target.width===w && target.height===h) return target;
  target.read=resizeFBO(target.read,w,h,internalFormat,format,type,param);
  target.write=createFBO(w,h,internalFormat,format,type,param);
  target.width=w;target.height=h;
  target.texelSizeX=1/w;target.texelSizeY=1/h;
  return target;
}

// ── BLIT ─────────────────────────────────────────────────────────────────────
let blitVAO;
(function initBlit(){
  gl.bindBuffer(gl.ARRAY_BUFFER,gl.createBuffer());
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,-1,1,1,1,1,-1]),gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,gl.createBuffer());
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array([0,1,2,0,2,3]),gl.STATIC_DRAW);
  blitVAO=gl.createVertexArray();
  gl.bindVertexArray(blitVAO);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
  gl.bindVertexArray(null);
})();
function blit(target,clear=false){
  if(target===null){
    gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  } else {
    gl.viewport(0,0,target.width,target.height);
    gl.bindFramebuffer(gl.FRAMEBUFFER,target.fbo);
  }
  if(clear){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);}
  gl.bindVertexArray(blitVAO);
  gl.drawElements(gl.TRIANGLES,6,gl.UNSIGNED_SHORT,0);
  gl.bindVertexArray(null);
}

// ── DITHERING TEXTURE ─────────────────────────────────────────────────────────
function createTextureAsync(){
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
  // Generate a simple 4x4 blue noise pattern inline
  const data=new Uint8Array(16*4);
  const bnoise=[0,130,85,200,170,50,220,30,100,230,15,160,245,70,140,190];
  for(let i=0;i<16;i++){data[i*4]=bnoise[i];data[i*4+1]=bnoise[(i+5)%16];data[i*4+2]=bnoise[(i+11)%16];data[i*4+3]=255;}
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,4,4,0,gl.RGBA,gl.UNSIGNED_BYTE,data);
  return {texture:tex,width:4,height:4,attach(id){gl.activeTexture(gl.TEXTURE0+id);gl.bindTexture(gl.TEXTURE_2D,tex);return id;}};
}

// ── PROGRAMS ─────────────────────────────────────────────────────────────────
const blurProg      = new GLProgram(blurVertSrc, blurFragSrc);
const copyProg      = new GLProgram(baseVertSrc, copyFragSrc);
const clearProg     = new GLProgram(baseVertSrc, clearFragSrc);
const colorProg     = new GLProgram(baseVertSrc, colorFragSrc);
const checkerProg   = new GLProgram(baseVertSrc, checkerFragSrc);
const bloomPreProg  = new GLProgram(baseVertSrc, bloomPreFilterFragSrc);
const bloomBlurProg = new GLProgram(baseVertSrc, bloomBlurFragSrc);
const bloomFinalProg= new GLProgram(baseVertSrc, bloomFinalFragSrc);
const sunraysMaskProg= new GLProgram(baseVertSrc, sunraysMaskFragSrc);
const sunraysProg   = new GLProgram(baseVertSrc, sunraysFragSrc);
const splatProg     = new GLProgram(baseVertSrc, splatFragSrc);
const advectionProg = new GLProgram(baseVertSrc, advectionFragSrc,
  ext.supportLinearFiltering?[]:['MANUAL_FILTERING']);
const divergenceProg= new GLProgram(baseVertSrc, divergenceFragSrc);
const curlProg      = new GLProgram(baseVertSrc, curlFragSrc);
const vorticityProg = new GLProgram(baseVertSrc, vorticityFragSrc);
const pressureProg  = new GLProgram(baseVertSrc, pressureFragSrc);
const gradSubProg   = new GLProgram(baseVertSrc, gradientSubtractFragSrc);
const keywords=[];
if(CFG.BLOOM) keywords.push('BLOOM');
if(CFG.SUNRAYS) keywords.push('SUNRAYS');
const displayProg   = new GLProgram(baseVertSrc, displayFragSrc, keywords);

const ditheringTexture = createTextureAsync();

// ── FBO STATE ────────────────────────────────────────────────────────────────
let dye, velocity, divergence, curl, pressure;
let bloom, bloomFramebuffers=[], sunrays, sunraysTemp;

function getResolution(res){
  let aspect=gl.drawingBufferWidth/gl.drawingBufferHeight;
  if(aspect<1) aspect=1/aspect;
  const min=Math.round(res);
  const max=Math.round(res*aspect);
  if(gl.drawingBufferWidth>gl.drawingBufferHeight)
    return {width:max,height:min};
  return {width:min,height:max};
}

function initFBOs(){
  let simRes=getResolution(CFG.SIM_RESOLUTION);
  let dyeRes=getResolution(CFG.DYE_RESOLUTION);
  const texType=ext.halfFloatTexType;
  const rgba=ext.formatRGBA;
  const rg=ext.formatRG;
  const r=ext.formatR;
  const filtering=ext.supportLinearFiltering?gl.LINEAR:gl.NEAREST;
  gl.disable(gl.BLEND);
  if(!dye)
    dye=createDoubleFBO(dyeRes.width,dyeRes.height,rgba.internalFormat,rgba.format,texType,filtering);
  else
    dye=resizeDoubleFBO(dye,dyeRes.width,dyeRes.height,rgba.internalFormat,rgba.format,texType,filtering);
  if(!velocity)
    velocity=createDoubleFBO(simRes.width,simRes.height,rg.internalFormat,rg.format,texType,filtering);
  else
    velocity=resizeDoubleFBO(velocity,simRes.width,simRes.height,rg.internalFormat,rg.format,texType,filtering);
  divergence=createFBO(simRes.width,simRes.height,r.internalFormat,r.format,texType,gl.NEAREST);
  curl=createFBO(simRes.width,simRes.height,r.internalFormat,r.format,texType,gl.NEAREST);
  pressure=createDoubleFBO(simRes.width,simRes.height,r.internalFormat,r.format,texType,gl.NEAREST);
  initBloomFBOs();
  initSunraysFBOs();
}

function initBloomFBOs(){
  let res=getResolution(CFG.BLOOM_RESOLUTION);
  const texType=ext.halfFloatTexType;
  const rgba=ext.formatRGBA;
  const filtering=ext.supportLinearFiltering?gl.LINEAR:gl.NEAREST;
  bloom=createFBO(res.width,res.height,rgba.internalFormat,rgba.format,texType,filtering);
  bloomFramebuffers.length=0;
  for(let i=0;i<CFG.BLOOM_ITERATIONS;i++){
    let w=res.width>>(i+1);
    let h=res.height>>(i+1);
    if(w<2||h<2) break;
    let fbo=createFBO(w,h,rgba.internalFormat,rgba.format,texType,filtering);
    bloomFramebuffers.push(fbo);
  }
}

function initSunraysFBOs(){
  let res=getResolution(CFG.SUNRAYS_RESOLUTION);
  const texType=ext.halfFloatTexType;
  const r=ext.formatR;
  const filtering=ext.supportLinearFiltering?gl.LINEAR:gl.NEAREST;
  sunrays=createFBO(res.width,res.height,r.internalFormat,r.format,texType,filtering);
  sunraysTemp=createFBO(res.width,res.height,r.internalFormat,r.format,texType,filtering);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function applyBloom(source, destination){
  if(bloomFramebuffers.length<2) return;
  let last=destination;
  gl.disable(gl.BLEND);
  bloomPreProg.bind();
  let knee=0.1*0.5;
  let curve0=0.1-knee;
  let curve1=knee*2;
  let curve2=0.25/knee;
  gl.uniform3f(bloomPreProg.uniforms.curve,curve0,curve1,curve2);
  gl.uniform1f(bloomPreProg.uniforms.threshold,0.1);
  gl.uniform1i(bloomPreProg.uniforms.uTexture,source.attach(0));
  blit(last);

  bloomBlurProg.bind();
  for(let i=0;i<bloomFramebuffers.length;i++){
    let dest=bloomFramebuffers[i];
    gl.uniform2f(bloomBlurProg.uniforms.texelSize,last.texelSizeX,last.texelSizeY);
    gl.uniform1i(bloomBlurProg.uniforms.uTexture,last.attach(0));
    blit(dest);
    last=dest;
  }

  gl.blendFunc(gl.ONE,gl.ONE);
  gl.enable(gl.BLEND);
  for(let i=bloomFramebuffers.length-2;i>=0;i--){
    let baseTex=bloomFramebuffers[i];
    gl.uniform2f(bloomBlurProg.uniforms.texelSize,last.texelSizeX,last.texelSizeY);
    gl.uniform1i(bloomBlurProg.uniforms.uTexture,last.attach(0));
    blit(baseTex);
    last=baseTex;
  }
  gl.disable(gl.BLEND);

  bloomFinalProg.bind();
  gl.uniform2f(bloomFinalProg.uniforms.texelSize,last.texelSizeX,last.texelSizeY);
  gl.uniform1i(bloomFinalProg.uniforms.uTexture,last.attach(0));
  gl.uniform1f(bloomFinalProg.uniforms.intensity,CFG.BLOOM_INTENSITY);
  blit(destination);
}

function applySunrays(source, mask, destination){
  gl.disable(gl.BLEND);
  sunraysMaskProg.bind();
  gl.uniform1i(sunraysMaskProg.uniforms.uTexture,source.attach(0));
  blit(mask);

  sunraysProg.bind();
  gl.uniform1f(sunraysProg.uniforms.weight,CFG.SUNRAYS_WEIGHT);
  gl.uniform1i(sunraysProg.uniforms.uTexture,mask.attach(0));
  blit(destination);

  blur(destination,sunraysTemp,1);
}

function blur(target,temp,iterations){
  blurProg.bind();
  for(let i=0;i<iterations;i++){
    gl.uniform2f(blurProg.uniforms.texelSize,target.texelSizeX,0.0);
    gl.uniform1i(blurProg.uniforms.uTexture,target.attach(0));
    blit(temp);
    gl.uniform2f(blurProg.uniforms.texelSize,0.0,target.texelSizeY);
    gl.uniform1i(blurProg.uniforms.uTexture,temp.attach(0));
    blit(target);
  }
}

function drawDisplay(target){
  let width=target?target.width:gl.drawingBufferWidth;
  let height=target?target.height:gl.drawingBufferHeight;
  displayProg.bind();
  if(CFG.BLOOM){
    gl.uniform1i(displayProg.uniforms.uBloom,bloom.attach(1));
    gl.uniform1i(displayProg.uniforms.uDithering,ditheringTexture.attach(2));
    gl.uniform2f(displayProg.uniforms.ditherScale,width/ditheringTexture.width,height/ditheringTexture.height);
  }
  if(CFG.SUNRAYS)
    gl.uniform1i(displayProg.uniforms.uSunrays,sunrays.attach(3));
  gl.uniform2f(displayProg.uniforms.texelSize,1/width,1/height);
  gl.uniform1i(displayProg.uniforms.uTexture,dye.read.attach(0));
  blit(target);
}

function step(dt){
  gl.disable(gl.BLEND);

  curlProg.bind();
  gl.uniform2f(curlProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(curlProg.uniforms.uVelocity,velocity.read.attach(0));
  blit(curl);

  vorticityProg.bind();
  gl.uniform2f(vorticityProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(vorticityProg.uniforms.uVelocity,velocity.read.attach(0));
  gl.uniform1i(vorticityProg.uniforms.uCurl,curl.attach(1));
  gl.uniform1f(vorticityProg.uniforms.curl,CFG.CURL);
  gl.uniform1f(vorticityProg.uniforms.dt,dt);
  blit(velocity.write);
  velocity.swap();

  divergenceProg.bind();
  gl.uniform2f(divergenceProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(divergenceProg.uniforms.uVelocity,velocity.read.attach(0));
  blit(divergence);

  clearProg.bind();
  gl.uniform1i(clearProg.uniforms.uTexture,pressure.read.attach(0));
  gl.uniform1f(clearProg.uniforms.value,CFG.PRESSURE);
  blit(pressure.write);
  pressure.swap();

  pressureProg.bind();
  gl.uniform2f(pressureProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(pressureProg.uniforms.uDivergence,divergence.attach(0));
  for(let i=0;i<CFG.PRESSURE_ITERATIONS;i++){
    gl.uniform1i(pressureProg.uniforms.uPressure,pressure.read.attach(1));
    blit(pressure.write);
    pressure.swap();
  }

  gradSubProg.bind();
  gl.uniform2f(gradSubProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(gradSubProg.uniforms.uPressure,pressure.read.attach(0));
  gl.uniform1i(gradSubProg.uniforms.uVelocity,velocity.read.attach(1));
  blit(velocity.write);
  velocity.swap();

  advectionProg.bind();
  gl.uniform2f(advectionProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  if(!ext.supportLinearFiltering)
    gl.uniform2f(advectionProg.uniforms.dyeTexelSize,velocity.texelSizeX,velocity.texelSizeY);
  let velId=velocity.read.attach(0);
  gl.uniform1i(advectionProg.uniforms.uVelocity,velId);
  gl.uniform1i(advectionProg.uniforms.uSource,velId);
  gl.uniform1f(advectionProg.uniforms.dt,dt);
  gl.uniform1f(advectionProg.uniforms.dissipation,CFG.VELOCITY_DISSIPATION);
  blit(velocity.write);
  velocity.swap();

  if(!ext.supportLinearFiltering)
    gl.uniform2f(advectionProg.uniforms.dyeTexelSize,dye.texelSizeX,dye.texelSizeY);
  gl.uniform1i(advectionProg.uniforms.uVelocity,velocity.read.attach(0));
  gl.uniform1i(advectionProg.uniforms.uSource,dye.read.attach(1));
  gl.uniform1f(advectionProg.uniforms.dissipation,CFG.DENSITY_DISSIPATION);
  blit(dye.write);
  dye.swap();
}

function splat(x,y,dx,dy,color,radius){
  splatProg.bind();
  gl.uniform1i(splatProg.uniforms.uTarget,velocity.read.attach(0));
  gl.uniform1f(splatProg.uniforms.aspectRatio,canvas.width/canvas.height);
  gl.uniform2f(splatProg.uniforms.point,x,y);
  gl.uniform3f(splatProg.uniforms.color,dx,dy,0);
  gl.uniform1f(splatProg.uniforms.radius,correctRadius(radius/100));
  blit(velocity.write);
  velocity.swap();

  gl.uniform1i(splatProg.uniforms.uTarget,dye.read.attach(0));
  gl.uniform3f(splatProg.uniforms.color,color[0],color[1],color[2]);
  blit(dye.write);
  dye.swap();
}
function correctRadius(radius){
  let asp=canvas.width/canvas.height;
  if(asp>1) radius*=asp;
  return radius;
}

// ── CANVAS RESIZE ─────────────────────────────────────────────────────────────
function resizeCanvas(){
  const w=canvas.clientWidth;
  const h=canvas.clientHeight;
  if(canvas.width!==w||canvas.height!==h){
    canvas.width=w;
    canvas.height=h;
    initFBOs();
  }
}

// ── HAND TRACKING STATE ───────────────────────────────────────────────────────
const NUM_TIPS=[4,8,12,16,20];
let prevTips={}; // {handIdx_tipIdx: {x,y,t}}
let pinchActive=[false,false];
let lastTime=performance.now();

function getSpeedColor(speed){
  if(speed<0.01) return [0.4,0.0,0.8];
  if(speed>0.05) return [1.0,1.0,1.0];
  const t=(speed-0.01)/(0.05-0.01);
  return [0.4*(1-t),0.8*t,0.8+(0.2-0.0)*t];
}

function onResults(results){
  if(!results.multiHandLandmarks) return;
  const now=performance.now();
  const dt=Math.max((now-lastTime)/1000,0.0001);
  lastTime=now;

  results.multiHandLandmarks.forEach((landmarks,handIdx)=>{
    NUM_TIPS.forEach(tipIdx=>{
      const lm=landmarks[tipIdx];
      const key=`${handIdx}_${tipIdx}`;
      // Mirror x for selfie mode
      const nx=1.0-lm.x;
      const ny=1.0-lm.y;
      const px=nx*canvas.width;
      const py=ny*canvas.height;
      if(prevTips[key]){
        const vx=(nx-prevTips[key].nx)/dt;
        const vy=(ny-prevTips[key].ny)/dt;
        const speed=Math.sqrt(vx*vx+vy*vy);
        if(speed>0.002){
          const force=speed*8000;
          const color=getSpeedColor(speed);
          const dx=vx/speed*force;
          const dy=vy/speed*force;
          splat(nx,ny,dx,-dy,color,CFG.SPLAT_RADIUS*100);
        }
      }
      prevTips[key]={nx,ny,t:now};
    });

    // Pinch detection between thumb(4) and index(8)
    const thumb=landmarks[4];
    const index=landmarks[8];
    const thumbNx=1.0-thumb.x;
    const indexNx=1.0-index.x;
    const dx2=thumbNx-indexNx;
    const dy2=thumb.y-index.y;
    const dist=Math.sqrt(dx2*dx2+dy2*dy2);
    const wasPinching=pinchActive[handIdx];
    const isPinching=dist<0.05;
    pinchActive[handIdx]=isPinching;

    if(isPinching){
      const mx=(thumbNx+indexNx)*0.5;
      const my=1.0-((thumb.y+index.y)*0.5);
      const angle=Math.random()*Math.PI*2;
      const force=15000;
      splat(mx,my,Math.cos(angle)*force,Math.sin(angle)*force,[1.0,0.2,0.8],0.012*100);
    } else if(wasPinching && !isPinching){
      // explosion burst
      const mx=(thumbNx+indexNx)*0.5;
      const my=1.0-((thumb.y+index.y)*0.5);
      for(let i=0;i<8;i++){
        const ang=(i/8)*Math.PI*2;
        const f=12000;
        splat(mx,my,Math.cos(ang)*f,Math.sin(ang)*f,[1.0,0.5,0.0],0.006*100);
      }
    }
  });

  // Clean up stale tips for hands that disappeared
  const activeKeys=new Set();
  results.multiHandLandmarks.forEach((lm,handIdx)=>{
    NUM_TIPS.forEach(tipIdx=>activeKeys.add(`${handIdx}_${tipIdx}`));
  });
  for(const key in prevTips){
    if(!activeKeys.has(key)) delete prevTips[key];
  }
}

// ── INIT MEDIAPIPE ────────────────────────────────────────────────────────────
const videoEl=document.getElementById('v');
const hands=new Hands({locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({
  maxNumHands:2,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.5
});
hands.onResults(onResults);

const camera=new Camera(videoEl,{
  onFrame:async()=>{ await hands.send({image:videoEl}); },
  width:1280,height:720
});
camera.start();

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
let prevFrameTime=performance.now();
function render(){
  resizeCanvas();
  const now=performance.now();
  const dt=Math.min((now-prevFrameTime)/1000,0.016666);
  prevFrameTime=now;

  step(dt);

  if(CFG.BLOOM) applyBloom(dye.read,bloom);
  if(CFG.SUNRAYS){ applySunrays(dye.read,sunraysTemp,sunrays); }

  gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
  gl.enable(gl.BLEND);
  drawDisplay(null);

  requestAnimationFrame(render);
}

// ── HINT ─────────────────────────────────────────────────────────────────────
const hint=document.getElementById('hint');
setTimeout(()=>hint.classList.add('hidden'),4000);

// ── START ─────────────────────────────────────────────────────────────────────
initFBOs();
render();
</script>
</body>
