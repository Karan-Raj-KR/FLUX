<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLUX — Hand Fluid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    canvas {
      display: block;
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    #camera-feed {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      width: 180px;
      height: 135px;
      object-fit: cover;
      transform: scaleX(-1);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: #111;
      display: block;
    }

    /* Draw mode controls — top-left */
    #draw-controls {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #draw-controls button {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.85);
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
      transition: background 0.15s, border-color 0.15s;
    }
    #draw-controls button:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.3);
    }
    #draw-btn.active {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.5);
    }
    #clear-btn { display: none; }

    #overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.35);
      font-family: system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      pointer-events: none;
      text-align: center;
      z-index: 10;
    }
    #status {
      position: fixed;
      top: 16px;
      right: 16px;
      color: rgba(255, 255, 255, 0.3);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 10;
      transition: opacity 1s;
    }

    #draw-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* Finger-tip cursor dot — visible only in draw mode */
    #finger-cursor {
      position: fixed;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
      pointer-events: none;
      z-index: 15;
      transform: translate(-50%, -50%);
      display: none;
      transition: opacity 0.1s;
    }

    #clear-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 255, 255, 0.92);
      font-family: system-ui, sans-serif;
      font-size: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <canvas id="draw-canvas"></canvas>

  <div id="draw-controls">
    <button id="draw-btn">✏️ Draw</button>
    <button id="clear-btn">🗑 Clear</button>
  </div>

  <div id="overlay">Move your hands to paint with light</div>
  <div id="status">initializing…</div>
  <div id="clear-flash">Canvas Cleared</div>
  <div id="finger-cursor"></div>

  <video id="camera-feed" autoplay playsinline muted></video>

  <!-- MediaPipe via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
